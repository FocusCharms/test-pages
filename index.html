<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Language Router</title>

  <script>
    (function () {
      const supported = ["en", "fr", "de"];
      const fallback = "en";

      function detectLanguage() {
        const stored = localStorage.getItem("lang");
        if (stored && supported.includes(stored)) return stored;

        const nav = navigator.language.slice(0, 2);
        if (supported.includes(nav)) return nav;

        return fallback;
      }

      const lang = detectLanguage();

      const segments = location.pathname.split("/").filter(Boolean);

      // GitHub project page → first segment is repo name
      const base =
        location.hostname.endsWith("github.io") && segments.length > 0
          ? "/" + segments[0]
          : "";

      const path = location.pathname
        .replace(base, "")
        .replace(/^\/+/, "");

      console.log(lang, segments, path)
      // Already language-prefixed → do nothing
      if (supported.some(l => path.startsWith(l + "/"))) return;
      location.replace(`${base}/${lang}/${path || ""}`);
    })();
  </script>

</head>
<body></body>
</html>
